buildscript {
    repositories {
        mavenLocal()
        mavenCentral()
        maven {
            url 'https://plugins.gradle.org/m2/'
        }
    }

    dependencies {
        classpath "com.gradleup.shadow:shadow-gradle-plugin:8.3.5"
    }
}

apply plugin: 'application'
apply plugin: 'java'
apply plugin: 'java-library'
//apply plugin: 'maven'
apply plugin: 'maven-publish'
apply plugin: 'com.gradleup.shadow'

group 'com.scienceminer.glutton'
version '0.3-SNAPSHOT'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// The main class of the application
mainClassName = 'com.scienceminer.glutton.web.LookupServiceApplication'

repositories {
    mavenLocal()
    mavenCentral()
}

sourceSets.main.resources {
    srcDirs = ["src/main/resources"];
}

configurations {
    all*.exclude group: 'org.slf4j', module: "slf4j-log4j12"
    all*.exclude group: 'log4j', module: "log4j"
    all*.exclude group: 'log4j2', module: "log4j2"
    all*.exclude group: 'org.codehaus.woodstox', module: 'woodstox-core-asl'
    implementation.setCanBeResolved(true)
}

processResources {
    filesMatching('config/glutton.yml') {
        filter {
            it.replace('project.version', project.property('version_placeholder'))
        }
    }
}

task install(dependsOn: 'installShadowDist')

dependencies {
    testImplementation group: 'junit', name: 'junit', version: '4.13.2'
    testImplementation "org.hamcrest:hamcrest-all:1.3"
    testImplementation "org.easymock:easymock:3.5"
    // Required so that JUnit 4 tests are discovered by useJUnitPlatform().
    // Without this, all 9 test classes silently fail to execute (the build still
    // reports BUILD SUCCESSFUL because there are zero failures).
    testRuntimeOnly 'org.junit.vintage:junit-vintage-engine:5.10.2'

    implementation "com.google.code.gson:gson:2.8.1"

    //Dropwizard
    implementation 'ru.vyarus:dropwizard-guicey:7.0.0'

    implementation 'io.dropwizard:dropwizard-bom:4.0.0'
    implementation 'io.dropwizard:dropwizard-core:4.0.0'
    implementation 'io.dropwizard:dropwizard-assets:4.0.0'
    implementation 'io.dropwizard:dropwizard-testing:4.0.0'
    implementation 'io.dropwizard.modules:dropwizard-testing-junit4:4.0.0'
    implementation 'io.dropwizard:dropwizard-forms:4.0.0'
    implementation 'io.dropwizard:dropwizard-client:4.0.0'
    implementation 'io.dropwizard:dropwizard-auth:4.0.0'
    implementation 'io.dropwizard.metrics:metrics-core:4.2.22'
    implementation 'io.dropwizard.metrics:metrics-servlets:4.2.22'

    implementation 'jakarta.validation:jakarta.validation-api:2.0.2'

    // SLF4J + Logback are inherited from Dropwizard 4 (SLF4J 2.x + Logback 1.4.x).
    // Do NOT pin them here to older versions — that would silently downgrade the runtime classpath.
    implementation 'org.apache.logging.log4j:log4j-to-slf4j:2.23.1'

    implementation "com.rockymadden.stringmetric:stringmetric-core_2.10:0.27.3"

    //Parsing XML/Json
    implementation group: 'org.codehaus.woodstox', name: 'stax2-api', version: '4.2.2'
    implementation 'com.fasterxml.woodstox:woodstox-core:6.6.2'

    implementation 'org.lmdbjava:lmdbjava:0.9.1'
    // FST 3.0.4-jdk17's POM erroneously declares a runtime dep on maven-bundle-plugin,
    // which transitively pulls maven-core 3.3.9 → guice 4.0 with classifier "no_aop".
    // After Gradle resolves Guice to 7.0.0 (forced by dropwizard-guicey), the classifier
    // survives and resolution fails because guice-7.0.0-no_aop.jar doesn't exist.
    // Exclude the offending maven-bundle-plugin tree.
    implementation('de.ruedigermoeller:fst:3.0.4-jdk17') {
        exclude group: 'org.apache.felix', module: 'maven-bundle-plugin'
    }
    implementation 'org.xerial.snappy:snappy-java:1.1.10.5'

    // Pin Apache HttpClient 4.x explicitly (was previously floating as a transitive of
    // elasticsearch-rest-high-level-client and the Crossref code). Used by CrossrefRequest,
    // ElasticSearchIndexer and MetadataMatching. The Grobid client no longer needs it.
    implementation 'org.apache.httpcomponents:httpclient:4.5.14'

    implementation 'org.elasticsearch.client:elasticsearch-rest-high-level-client:7.17.2'
    implementation 'co.elastic.clients:elasticsearch-java:8.12.1'
    implementation ('org.apache.solr:solr-solrj:9.5.0') {
        exclude group: 'org.eclipse.jetty', module: 'jetty-http2'
        exclude group: 'org.eclipse.jetty.http2', module: 'http2-client'
    }

    implementation 'org.apache.commons:commons-collections4:4.1'
    implementation 'commons-beanutils:commons-beanutils:1.9.4'
    implementation 'commons-io:commons-io:2.15.1'
    implementation group: 'org.apache.commons', name: 'commons-compress', version: '1.20'

    implementation group: 'org.tukaani', name: 'xz', version: '1.8'

    implementation "com.fasterxml.jackson.core:jackson-core:2.14.3"
    implementation "com.fasterxml.jackson.core:jackson-databind:2.14.3"
    implementation "com.fasterxml.jackson.module:jackson-module-afterburner:2.14.3"
    implementation "com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.14.3"

    implementation group: 'com.opencsv', name: 'opencsv', version: '5.0'
}

distributions {
    shadow {
        /*contents {
            from(new File(rootProject.rootDir, "data/config")) {
                into "data/config"
            }
        }*/
    }
}

shadowJar {
    archiveClassifier = 'onejar'
    mergeServiceFiles()
    zip64 true
    manifest {
        attributes 'Main-Class': mainClassName
    }
    exclude("logback.xml")
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

distTar.enabled = false
distZip.enabled = false
shadowDistTar.enabled = false

artifacts {
    archives shadowJar
}

// arguments for exec tasks
ext.getArg = { propName, defaultVal ->
    return project.hasProperty(propName) ? project.getProperty(propName) : defaultVal;
}

// JVM --add-opens flags required by FST 3.0.4-jdk17 and lmdbjava on Java 17+.
// Shared by every JavaExec task and the test task below.
//   - java.base/* opens cover the bulk of FST/lmdbjava reflection.
//   - java.sql/java.sql is needed for FST's serialization of java.sql.Timestamp.
ext.addOpensArgs = [
    "--add-opens", "java.base/java.nio=ALL-UNNAMED",
    "--add-opens", "java.base/sun.nio.ch=ALL-UNNAMED",
    "--add-opens", "java.base/java.text=ALL-UNNAMED",
    "--add-opens", "java.base/java.net=ALL-UNNAMED",
    "--add-opens", "java.base/java.lang=ALL-UNNAMED",
    "--add-opens", "java.base/java.lang.reflect=ALL-UNNAMED",
    "--add-opens", "java.base/java.math=ALL-UNNAMED",
    "--add-opens", "java.base/java.util=ALL-UNNAMED",
    "--add-opens", "java.base/java.util.concurrent=ALL-UNNAMED",
    "--add-opens", "java.base/java.util.stream=ALL-UNNAMED",
    "--add-opens", "java.base/java.time=ALL-UNNAMED",
    "--add-opens", "java.base/java.io=ALL-UNNAMED",
    "--add-opens", "java.sql/java.sql=ALL-UNNAMED"
]

task server(dependsOn: 'classes', type: JavaExec, group: 'service') {
    main = 'com.scienceminer.glutton.web.LookupServiceApplication'
    classpath = sourceSets.main.runtimeClasspath
    args 'server', getArg('config', 'config/glutton.yml')
    jvmArgs = ['-Xmx3072m'] + addOpensArgs
}

// Make ./gradlew run equivalent to ./gradlew server. The application plugin's
// auto-generated `run` task has none of the required CLI args or --add-opens
// JVM flags by default; wire them in explicitly here so contributors following
// Gradle convention (./gradlew run) get the same behavior as ./gradlew server.
tasks.named('run').configure {
    workingDir = rootProject.rootDir
    args = ['server', getArg('config', 'config/glutton.yml')]
    jvmArgs = ['-Xmx3072m'] + addOpensArgs
}

task crossref(dependsOn: 'classes', type: JavaExec, group: 'data') {
    main = 'com.scienceminer.glutton.web.LookupServiceApplication'
    classpath = sourceSets.main.runtimeClasspath
    args 'crossref', '--input', getArg('input', ''), getArg('config', 'config/glutton.yml')
    jvmArgs = ['-Xmx3072m'] + addOpensArgs
}

